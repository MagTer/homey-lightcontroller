<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Schedule ring with phase dots -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#8a8aaa" stroke-width="2"/>
  <circle cx="50" cy="12" r="4" fill="#1a237e"/>
  <circle cx="88" cy="50" r="4" fill="#f57c00"/>
  <circle cx="50" cy="88" r="4" fill="#fdd835"/>
  <circle cx="12" cy="50" r="4" fill="#7b1fa2"/>

  <!-- Lamp cord -->
  <line x1="50" y1="8" x2="50" y2="24" stroke="#666688" stroke-width="2" stroke-linecap="round"/>

  <!-- Lamp shade -->
  <polygon points="40,24 60,24 68,46 32,46" fill="#F5A623"/>
  <polygon points="44,29 56,29 62,42 38,42" fill="#ffbe4d"/>

  <!-- Glow below lamp -->
  <ellipse cx="50" cy="52" rx="12" ry="6" fill="#F5A623" opacity="0.35" filter="url(#glow)"/>

  <!-- Light rays -->
  <line x1="30" y1="48" x2="18" y2="56" stroke="#F5A623" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="48" x2="82" y2="56" stroke="#F5A623" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="58" x2="30" y2="70" stroke="#F5A623" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="58" x2="70" y2="70" stroke="#F5A623" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
